databases:
  - name: price-tracker-db
    plan: free

services:
  - type: web
    name: price-tracker-api
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    autoDeploy: false
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: price-tracker-db
          property: connectionString
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
